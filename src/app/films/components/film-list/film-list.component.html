@let filmsList = filmsListFiltered();

<div class="films-list-page">
  @if (filmsList.length > 0) {
    <div class="films-container">
      @for (filmItem of filmsList; track filmItem.id) {
        <app-film-card [filmData]="filmItem" (filmClick)="redirectDetailsPage(filmItem)"></app-film-card>
      }
    </div>
  } @else {
    <div class="empty-state">No films found</div>
  }
</div>
